<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Detection Model</title>
    <!-- Connect to external CSS -->
    <link rel="stylesheet" href="style.css">
    
    <!-- TensorFlow.js and Teachable Machine Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>

    <div class="container">
        <div class="one">
            <h1>Image Detection Model</h1>
        </div>
        
        <div class="controls">
            <button type="button" onclick="init()">Start Model</button>
            <input type="file" id="imageUpload" accept="image/*">
        </div>

        <div id="image-container"></div>
        <div id="label-container"></div>
    </div>

    <!-- Connect to external JS -->
    <script src="index.js"></script>
</body>
</html>
